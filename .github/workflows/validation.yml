name: Validation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validation:
    name: Non-mutating validation
    runs-on: ubuntu-latest
    env:
      VITE_SITE_URL: https://stockwiseapp.com
      VITE_SUPABASE_URL: https://stockwise-ci.invalid
      VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check migration filenames
        run: npm run check:migrations

      - name: Lint TypeScript and React
        run: npm run lint:js

      - name: Check CSS variables
        run: npm run check:css-vars

      - name: Check CSS classes
        run: npm run check:css-classes

      - name: Build production bundle
        run: npm run build
